<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/form/form-2.css">
    <title>Document</title>
</head>
<body>
<div class="container">
    <div class="content">
        <!-- Левая колонка с контактами -->
        <div class="left-side">
            <div class="adress detalis">
                <i class="fas fa-map-marker-alt"></i>
                <div class="topic">Адрес</div>
                <div class="text-one">г.Санкт-Петербург</div>
                <div class="text-two">Дворцовая площадь</div>
            </div>
            <div class="phone  detalis">
                <i class="fas fa-phone-square"></i>
                <div class="topic">Телефон</div>
                <div class="text-one">+7 (812) 710-90-79-63</div>
                <div class="text-two">+7 (812) 710-90-79-36</div>
            </div>
            <div class="email detalis">
                <i class="fas fa-envelope"></i>
                <div class="topic">Email</div>
                <div class="text-one">support@site.com</div>
                <div class="text-two">admin@site.com</div>
            </div>
        </div>

        <!-- Правая колонка с формой -->
        <div class="right-side">
            <div class="topic-text">отправьте нам сообщения</div>
            <p>если у вас есть какие-то вопросы или предложения по сотрудничеству то заполните форму</p>
            <form action="#">
                <div class="input-box">
                    <input type="text" placeholder="введите ваше имя">
                </div>
                <div class="input-box">
                    <input type="tel" placeholder="введите ваш Телефон">
                </div>
                <div class="input-box">
                    <input type="email" placeholder="введите ваш email">
                </div>
                <div class="input-box message-box">
                    <textarea placeholder="сообщение"></textarea>
                </div>
                <button type="submit">Отправить</button>
            </form>
        </div>
    </div>
<script src="https://kit.fontawesome.com/b85fae13aa.js" crossorigin="anonymous"></script>
</body>
</html>
